name: Unity CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Validate phase-1 required files
        shell: bash
        run: |
          test -f .editorconfig
          test -f Assets/_Project/Scripts/Core/GeminiLab.Core.asmdef
          test -f Assets/_Project/Scripts/Core/GameBootstrap.cs
          test -f Assets/_Project/Scripts/Core/FSM/StateMachine.cs
          test -f Assets/_Project/Scripts/Modules/Pet/PetStateMachineBuilder.cs
          test -f Assets/_Project/Scripts/Modules/Persistence/SaveSystem.cs
          test -f Assets/_Project/Tests/EditMode/GeminiLab.Tests.EditMode.asmdef
          test -f Assets/_Project/Scenes/Boot.unity

  unity-editmode-tests:
    runs-on: ubuntu-latest
    needs: validate-structure
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.62f3
          testMode: EditMode
          artifactsPath: test-results

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: editmode-test-results
          path: test-results

  unity-empty-build:
    runs-on: ubuntu-latest
    needs: unity-editmode-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.62f3
          targetPlatform: StandaloneWindows64
          buildName: GeminiLab
